# =============================================================================
# Nginx Configuration — Multi-Tenant API Manager
#
# Architecture:
#   Client → Nginx:80 (host:8080) → PHP-FPM laravel_app:9000
#
# All PHP requests are proxied to the PHP-FPM container (laravel_app) via
# the fastcgi_pass directive. Static assets in public/ are served directly
# by Nginx without touching PHP-FPM (try_files $uri $uri/ @php).
#
# API routes (/api/*) follow the same flow — the request reaches Laravel's
# bootstrap which routes through bootstrap/app.php → ApiGatewayGuardMiddleware.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Document root — must point to Laravel's public/ directory.
    root /var/www/html/public;
    index index.php index.html;

    # ---------------------------------------------------------------------------
    # Charset and MIME handling
    # ---------------------------------------------------------------------------
    charset utf-8;

    # ---------------------------------------------------------------------------
    # Logging
    # Logs are written to stdout/stderr so Docker captures them via
    # `docker logs laravel_nginx` without needing a file-based log driver.
    # ---------------------------------------------------------------------------
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------------------
    # Client body size limit
    # Set generously for API payloads; tighten in production if needed.
    # ---------------------------------------------------------------------------
    client_max_body_size 50M;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # Compresses JSON API responses significantly (typical 60–80% reduction).
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml;
    gzip_min_length 256;
    gzip_comp_level 5;

    # ---------------------------------------------------------------------------
    # Static asset caching
    # Cache-Control for compiled assets with content-hashed filenames.
    # ---------------------------------------------------------------------------
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Main request routing
    #
    # 1. Try to serve the URI as a static file directly from public/.
    # 2. If not found, try as a directory.
    # 3. Fall through to PHP (index.php) — Laravel's front controller.
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------------------------------------------------------
    # PHP-FPM proxy
    #
    # All .php requests are forwarded to the laravel_app container on port 9000.
    # The container name 'laravel_app' is resolved by Docker's internal DNS
    # within the laravel_network bridge network.
    # ---------------------------------------------------------------------------
    location ~ \.php$ {
        # Only process files that exist; prevent arbitrary file execution.
        try_files $uri =404;

        fastcgi_pass laravel_app:9000;
        fastcgi_index index.php;

        # Standard FastCGI parameters.
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Timeouts — generous for long-running artisan commands proxied via web.
        fastcgi_read_timeout  300;
        fastcgi_send_timeout  300;
        fastcgi_connect_timeout 60;

        # Buffer tuning — reduces TCP round-trips for typical JSON API responses.
        fastcgi_buffer_size         16k;
        fastcgi_buffers             4 16k;
        fastcgi_busy_buffers_size   32k;

        # Pass real client IP to Laravel's Request::ip() / trusted proxies.
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP       $remote_addr;
    }

    # ---------------------------------------------------------------------------
    # Deny access to hidden files and sensitive paths
    # ---------------------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ---------------------------------------------------------------------------
    # Custom error pages — return JSON for API prefix
    # Laravel's exception handler already returns JSON for /api/* requests
    # (configured in bootstrap/app.php), but this catches Nginx-level errors
    # (e.g. upstream timeouts) before they reach PHP.
    # ---------------------------------------------------------------------------
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
